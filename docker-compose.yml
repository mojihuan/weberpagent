services:
  backend:
    build: .
    container_name: aidriveuitest-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      # Uncomment to enable external ERP module (WEBSERP_PATH)
      # - /path/to/webseleniumerp:/app/external/webseleniumerp:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/database.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    shm_size: '2gb'
